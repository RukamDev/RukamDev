<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">RukamDev custom banner</title>
  <desc id="desc">Dark terminal style banner for RukamDev with backend focus, links, and decorative code graphics.</desc>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1a1a1a" />
    </pattern>
    <linearGradient id="avatarGlow" x1="0" y1="0" x2="0" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a5af8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00ff87" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="980" height="280" rx="18" fill="#0a0a0a"/>
  <rect width="980" height="280" rx="18" fill="url(#dots)" opacity="0.9"/>
  <rect x="1" y="1" width="978" height="278" rx="17" stroke="#1e1e1e"/>
  <path d="M198 28H716" stroke="#151515"/>
  <path d="M198 252H716" stroke="#151515"/>

  <g transform="translate(100 140)">
    <circle r="70" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="2"/>
    <circle r="56" fill="url(#avatarGlow)" stroke="#222"/>
    <circle r="64" fill="none" stroke="#7a5af8" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="-4" text-anchor="middle" fill="#e0e0e0" font-family="'JetBrains Mono','Courier New',monospace" font-size="30" font-weight="700">GS</text>
    <text x="0" y="22" text-anchor="middle" fill="#888" font-family="'JetBrains Mono','Courier New',monospace" font-size="12">@RukamDev</text>
  </g>

  <g transform="translate(220 34)">
    <line x1="0" y1="26" x2="118" y2="26" stroke="#7a5af8" stroke-width="2" opacity="0.8"/>
    <line x1="370" y1="26" x2="488" y2="26" stroke="#7a5af8" stroke-width="2" opacity="0.8"/>
    <text x="244" y="34" text-anchor="middle" fill="#ffffff" font-family="'JetBrains Mono','Courier New',monospace" font-size="36" font-weight="700">Backend Development</text>

    <g transform="translate(18 62)">
      <rect x="0" y="0" width="70" height="24" rx="6" fill="#111" stroke="#333"/>
      <text x="35" y="16" text-anchor="middle" fill="#888" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" letter-spacing="1.4">FOCUS</text>
      <rect x="82" y="0" width="242" height="24" rx="6" fill="#7a5af8"/>
      <text x="203" y="16" text-anchor="middle" fill="#f7f7f7" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700">BACKEND DEVELOPMENT *</text>
    </g>

    <g transform="translate(18 98)">
      <rect x="0" y="0" width="92" height="24" rx="6" fill="#111" stroke="#333"/>
      <text x="46" y="16" text-anchor="middle" fill="#888" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" letter-spacing="1.4">LEARNING</text>
      <rect x="104" y="0" width="220" height="24" rx="6" fill="#e5a550"/>
      <text x="214" y="16" text-anchor="middle" fill="#1a1a1a" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700">JAVA | MYSQL | PYTHON *</text>
    </g>

    <g transform="translate(18 134)">
      <rect x="0" y="0" width="84" height="24" rx="6" fill="#111" stroke="#333"/>
      <text x="42" y="16" text-anchor="middle" fill="#888" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" letter-spacing="1.4">MINDSET</text>
      <rect x="96" y="0" width="188" height="24" rx="6" fill="#7a5af8"/>
      <text x="190" y="16" text-anchor="middle" fill="#f7f7f7" font-family="'JetBrains Mono','Courier New',monospace" font-size="11" font-weight="700">ALWAYS EVOLVING *</text>
    </g>

    <g transform="translate(8 186)">
      <a href="https://your-portfolio-link.com">
        <rect x="0" y="0" width="126" height="28" rx="8" fill="#111" stroke="#333"/>
        <text x="63" y="18" text-anchor="middle" fill="#aaa" font-family="'JetBrains Mono','Courier New',monospace" font-size="12">PORTFOLIO -&gt;</text>
      </a>
      <a href="https://gitlab.com/your-username">
        <rect x="138" y="0" width="110" height="28" rx="8" fill="#111" stroke="#333"/>
        <text x="193" y="18" text-anchor="middle" fill="#aaa" font-family="'JetBrains Mono','Courier New',monospace" font-size="12">GITLAB -&gt;</text>
      </a>
      <a href="https://linkedin.com/in/your-username">
        <rect x="252" y="0" width="126" height="28" rx="8" fill="#111" stroke="#333"/>
        <text x="315" y="18" text-anchor="middle" fill="#aaa" font-family="'JetBrains Mono','Courier New',monospace" font-size="12">LINKEDIN -&gt;</text>
      </a>
    </g>
  </g>

  <g transform="translate(748 26)">
    <rect x="0" y="0" width="190" height="112" rx="10" fill="#101010" stroke="#2a2a2a"/>
    <circle cx="18" cy="14" r="3" fill="#7a5af8"/>
    <circle cx="30" cy="14" r="3" fill="#98c379"/>
    <circle cx="42" cy="14" r="3" fill="#e5a550"/>
    <rect x="14" y="26" width="50" height="6" rx="3" fill="#1a1a1a"/>
    <rect x="14" y="42" width="94" height="4" rx="2" fill="#7a5af8"/>
    <rect x="112" y="42" width="48" height="4" rx="2" fill="#444"/>
    <rect x="14" y="54" width="122" height="4" rx="2" fill="#98c379"/>
    <rect x="14" y="66" width="104" height="4" rx="2" fill="#e5a550"/>
    <rect x="14" y="78" width="130" height="4" rx="2" fill="#888"/>
    <rect x="14" y="90" width="72" height="4" rx="2" fill="#7a5af8"/>
    <rect x="92" y="90" width="54" height="4" rx="2" fill="#98c379"/>
  </g>

  <g transform="translate(782 152)">
    <ellipse cx="44" cy="12" rx="34" ry="10" fill="#111" stroke="#333"/>
    <path d="M10 12V58C10 63.523 25.222 68 44 68C62.778 68 78 63.523 78 58V12" fill="#111" stroke="#333"/>
    <ellipse cx="44" cy="35" rx="34" ry="10" fill="#111" stroke="#333"/>
    <ellipse cx="44" cy="58" rx="34" ry="10" fill="#111" stroke="#333"/>
    <ellipse cx="44" cy="12" rx="28" ry="7" fill="#7a5af8" fill-opacity="0.18"/>
    <ellipse cx="44" cy="35" rx="28" ry="7" fill="#98c379" fill-opacity="0.16"/>
    <ellipse cx="44" cy="58" rx="28" ry="7" fill="#e5a550" fill-opacity="0.18"/>
  </g>

  <g transform="translate(838 154)" opacity="0.28">
    <path d="M0 80H122" stroke="#1f1f1f"/>
    <path d="M12 72H134" stroke="#1f1f1f"/>
    <path d="M24 64H146" stroke="#1f1f1f"/>
    <path d="M36 56H158" stroke="#1f1f1f"/>
    <path d="M48 48H170" stroke="#1f1f1f"/>
    <path d="M0 80L42 38" stroke="#222"/>
    <path d="M24 80L66 38" stroke="#222"/>
    <path d="M48 80L90 38" stroke="#222"/>
    <path d="M72 80L114 38" stroke="#222"/>
    <path d="M96 80L138 38" stroke="#222"/>
    <path d="M120 80L162 38" stroke="#222"/>
  </g>
</svg>
