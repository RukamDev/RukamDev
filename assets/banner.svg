<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">RukamDev banner</title>
  <desc id="desc">Dark futuristic banner with purple, green, and orange accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05060A"/>
      <stop offset="0.45" stop-color="#0B0B12"/>
      <stop offset="1" stop-color="#08090D"/>
    </linearGradient>
    <linearGradient id="accent" x1="186" y1="0" x2="1114" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A855F7"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1277" height="317" rx="22.5" stroke="#A855F7" stroke-opacity="0.18"/>

  <g opacity="0.3">
    <path d="M44 70h184l26 26h148" stroke="#A855F7" stroke-width="2"/>
    <path d="M1236 78h-170l-32 32H892" stroke="#22C55E" stroke-width="2"/>
    <path d="M44 256h162l22-22h154" stroke="#F97316" stroke-width="2"/>
    <path d="M1236 248h-188l-28-28H878" stroke="#A855F7" stroke-width="2"/>
  </g>

  <g opacity="0.42">
    <circle cx="168" cy="98" r="3" fill="#A855F7"/>
    <circle cx="356" cy="98" r="3" fill="#22C55E"/>
    <circle cx="932" cy="110" r="3" fill="#22C55E"/>
    <circle cx="1096" cy="110" r="3" fill="#F97316"/>
    <circle cx="196" cy="228" r="3" fill="#F97316"/>
    <circle cx="360" cy="228" r="3" fill="#A855F7"/>
    <circle cx="946" cy="214" r="3" fill="#A855F7"/>
    <circle cx="1080" cy="214" r="3" fill="#22C55E"/>
  </g>

  <rect x="112" y="58" width="150" height="10" rx="5" fill="#A855F7" fill-opacity="0.14"/>
  <rect x="1028" y="246" width="140" height="10" rx="5" fill="#22C55E" fill-opacity="0.12"/>
  <rect x="578" y="70" width="124" height="4" rx="2" fill="url(#accent)" filter="url(#glowPurple)"/>
  <rect x="482" y="250" width="316" height="3" rx="1.5" fill="url(#accent)"/>

  <text x="640" y="154" text-anchor="middle" fill="#F8FAFC" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="56" font-weight="700" letter-spacing="2">
    RukamDev
  </text>

  <text x="640" y="194" text-anchor="middle" fill="#C084FC" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" letter-spacing="6">
    FULLSTACK  .  PROBLEM SOLVING  .  REAL SYSTEMS
  </text>

  <text x="640" y="228" text-anchor="middle" fill="#9CA3AF" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" letter-spacing="4">
    DARK INTERFACE  |  CLEAN CODE  |  REAL SOLUTIONS
  </text>
</svg>
